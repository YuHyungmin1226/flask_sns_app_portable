{% extends "base.html" %}

{% block title %}새 게시물 작성 - Flask SNS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">새 게시물 작성</h2>
                <form id="uploadForm" method="POST" action="{{ url_for('new_post') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="content" class="form-label">내용</label>
                        <textarea class="form-control" id="content" name="content" rows="5"></textarea>
                        <div class="form-text">
                            URL을 포함하면 자동으로 미리보기가 생성됩니다.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="files" class="form-label">파일 첨부 (이미지, 비디오, 문서 등)</label>
                        <input class="form-control" type="file" id="files" name="files" multiple>
                        <div class="form-text">
                            여러 파일을 선택할 수 있습니다. (최대 5000MB)
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div id="progressContainer" class="mb-3 d-none">
                        <div class="progress" style="height: 25px;">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                        </div>
                        <div id="progressStatus" class="small text-muted mt-1 text-center">업로드 중...</div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" id="submitBtn" class="btn btn-dark">게시하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const form = e.target;
    const formData = new FormData(form);
    const submitBtn = document.getElementById('submitBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressStatus = document.getElementById('progressStatus');
    
    // 버튼 비활성화 및 프로그레스 바 표시
    submitBtn.disabled = true;
    progressContainer.classList.remove('d-none');
    
    const xhr = new XMLHttpRequest();
    
    // 업로드 진행 이벤트
    xhr.upload.addEventListener('progress', function(e) {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + '%';
            progressBar.setAttribute('aria-valuenow', percent);
            progressBar.textContent = percent + '%';
            
            if (percent === 100) {
                progressStatus.textContent = '서버에서 처리 중입니다... 잠시만 기다려 주세요.';
            } else {
                progressStatus.textContent = `업로드 중: ${percent}% (${(e.loaded / 1024 / 1024).toFixed(1)}MB / ${(e.total / 1024 / 1024).toFixed(1)}MB)`;
            }
        }
    });
    
    // 완료 이벤트
    xhr.addEventListener('load', function() {
        if (xhr.status >= 200 && xhr.status < 300) {
            // 성공 시 인덱스 페이지로 이동
            window.location.href = "{{ url_for('index') }}";
        } else {
            alert('업로드 실패: ' + (xhr.responseText || '알 수 없는 오류가 발생했습니다.'));
            submitBtn.disabled = false;
            progressContainer.classList.add('d-none');
        }
    });
    
    // 오류 이벤트
    xhr.addEventListener('error', function() {
        alert('네트워크 오류가 발생했습니다.');
        submitBtn.disabled = false;
        progressContainer.classList.add('d-none');
    });
    
    xhr.open('POST', form.action);
    xhr.send(formData);
});
</script>
{% endblock %}
